<!doctype html>
<html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#153c32"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="Odak"><link rel="manifest" href="manifest.json"><link rel="icon" href="icon.svg" type="image/svg+xml"><link rel="apple-touch-icon" href="icon.svg"><title>Odak Kronometresi</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;padding:28px 15px;background:#e8efe9;color:#10251f;font-family:Arial,sans-serif}.app{max-width:470px;margin:auto;padding:25px 20px;background:#fbfcf8;border-radius:30px;box-shadow:0 25px 80px #18372b2b}header,.panel-title,.day-head,.session{display:flex;align-items:center}header,.panel-title{justify-content:space-between}.tag{font-size:11px;letter-spacing:.15em;color:#16855f;font-weight:bold}h1{font:30px Georgia,serif;margin:5px 0}.status{padding:8px 11px;border-radius:99px;background:#eef1ed;color:#718078;font-size:12px}.live{color:#16855f;background:#dff7ed}.card{margin-top:25px;padding:30px 18px 24px;text-align:center;color:#fff;border-radius:28px;background:linear-gradient(145deg,#1d5242,#0d2922);box-shadow:0 20px 45px #123b2e36}.card small{color:#a9d4c4;letter-spacing:.18em}.time{font-size:54px;font-variant-numeric:tabular-nums;margin:20px 0 25px}.card button{border:0;width:100%;height:58px;border-radius:18px;background:#f0c96d;color:#16372e;font-weight:bold;font-size:16px;cursor:pointer}.card button.stop{background:#f3aa91;color:#5b1d13}.card #resetTimer{height:40px;margin-top:12px;background:#ffffff12;color:#dbe9e3;border:1px solid #ffffff30;font-size:12px}.hint{font-size:11px;color:#9fbbb1}.panel{margin-top:24px;padding:21px;border:1px solid #dfe7e1;border-radius:22px;background:#fff}.panel h2{font:22px Georgia,serif;margin:5px 0 18px}.clear-all,.delete-one{border:0;background:#fff0ed;color:#a63d2d;border-radius:10px;padding:8px 10px;font-size:11px;font-weight:bold;cursor:pointer}.day-group{border-top:1px solid #e4e9e5;padding:15px 0 4px}.day-head{gap:12px}.date{width:46px;height:46px;display:grid;place-content:center;text-align:center;border-radius:13px;background:#f5f2e9;font-weight:bold}.date span{font-size:9px;color:#718078}.info{flex:1}.info b{display:block;text-transform:capitalize}.info small{color:#718078}.day-total,.duration{color:#16855f;font-size:12px;font-weight:bold}.session{margin-left:58px;padding:9px 0;border-top:1px dashed #e4e9e5}.session-name{flex:1;color:#52635c;font-size:12px}.duration{margin-right:8px}.delete-one{padding:6px 8px}.empty{text-align:center;color:#718078;background:#f5f7f3;padding:22px;border-radius:15px}footer{text-align:center;color:#89948f;font-size:11px;margin-top:22px}@media(max-width:500px){body{padding:0}.app{min-height:100vh;border-radius:0}.time{font-size:48px}}
.action-row{display:flex;gap:10px}.action-row button{width:50%}.card #saveTimer{background:#dff7ed;color:#145c44}.card #saveTimer:disabled{opacity:.4;cursor:not-allowed}
.sync{margin-top:18px;padding:14px;border-radius:18px;background:#edf7f2;border:1px solid #cfe6da}.sync b{display:block;font-size:12px;margin-bottom:8px}.sync-row{display:flex;gap:7px}.sync input{min-width:0;flex:1;border:1px solid #bdd5ca;border-radius:10px;padding:10px;font-size:12px}.sync button{border:0;border-radius:10px;padding:0 12px;background:#16855f;color:#fff;font-weight:bold}.sync small{display:block;margin-top:7px;color:#60736b}.sync.ok small{color:#16855f}
</style></head><body><main class="app">
<header><div><div class="tag">ODAK KRONOMETRESİ</div><h1>Bugünkü emeğin</h1></div><div id="status" class="status">● Hazır</div></header>
<section id="syncPanel" class="sync"><b>☁ CİHAZ SENKRONİZASYONU</b><div class="sync-row"><input id="syncCode" maxlength="20" placeholder="20 karakterlik kod"><button id="connectSync">Bağlan</button></div><small id="syncStatus">İki cihazda aynı kodu kullan.</small></section>
<section class="card"><small>AKTİF KRONOMETRE</small><div id="time" class="time">00:00:00</div><div class="action-row"><button id="toggle">▶ Başlat</button><button id="saveTimer">✓ Kaydet</button></div><button id="resetTimer">↺ Kronometreyi sıfırla</button><p id="hint" class="hint">Durdurabilir, devam edebilir ve hazır olduğunda kaydedebilirsin.</p></section>
<section class="panel"><div class="panel-title"><div><div class="tag">GEÇMİŞ</div><h2>Günlük kayıtların</h2></div><button id="clearAll" class="clear-all">Tümünü sil</button></div><div id="history"></div></section>
<footer>Her çalışma ayrı kaydedilir. Verilerin bu bilgisayarda saklanır.</footer></main>
<script>
const K='odak-kronometresi-pc-v2',DB='https://odak-kronometresi-default-rtdb.europe-west1.firebasedatabase.app';
let x={sessions:{},running:false,startedAt:null,currentSeconds:0};try{x={...x,...JSON.parse(localStorage.getItem(K)||'{}')}}catch(e){}
let syncCode=localStorage.getItem('odak-sync-code')||'',syncBusy=false;
if(!Object.keys(x.sessions).length){try{const old=JSON.parse(localStorage.getItem('odak-kronometresi-pc-v1')||'{}');Object.entries(old.days||{}).forEach(([day,seconds])=>{if(seconds>0)x.sessions[day]=[{id:'eski-'+day,seconds,time:'Önceki kayıt'}]})}catch(e){}}
const key=()=>new Date().toLocaleDateString('sv-SE');
const elapsed=()=>Math.max(0,(x.currentSeconds||0)+(x.running&&x.startedAt?Math.floor((Date.now()-x.startedAt)/1000):0));
const fmt=s=>[Math.floor(s/3600),Math.floor(s%3600/60),s%60].map(v=>String(v).padStart(2,'0')).join(':');
const short=s=>{let h=Math.floor(s/3600),m=Math.floor(s%3600/60),n=s%60;return h?`${h} sa ${m} dk`:m?`${m} dk ${n} sn`:`${n} sn`};
function save(){x.updatedAt=Date.now();localStorage.setItem(K,JSON.stringify(x));pushCloud()}
async function pushCloud(){if(!syncCode||syncBusy)return;try{await fetch(`${DB}/sync/${syncCode}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(x)});setSync('✓ Senkronize',true)}catch(e){setSync('Bağlantı bekleniyor…')}}
function setSync(text,ok=false){document.querySelector('#syncStatus').textContent=text;document.querySelector('#syncPanel').className='sync'+(ok?' ok':'')}
async function pullCloud(first=false){if(!syncCode||syncBusy)return;syncBusy=true;try{const r=await fetch(`${DB}/sync/${syncCode}.json`),remote=await r.json();if(remote&&(!x.updatedAt||remote.updatedAt>x.updatedAt)){x={sessions:{},running:false,startedAt:null,currentSeconds:0,...remote};localStorage.setItem(K,JSON.stringify(x));render()}else if(first&&!remote){syncBusy=false;await pushCloud();return}setSync('✓ Senkronize',true)}catch(e){setSync('Bağlantı bekleniyor…')}finally{syncBusy=false}}
function render(){
 const e=elapsed(),b=document.querySelector('#toggle'),st=document.querySelector('#status'),saveButton=document.querySelector('#saveTimer');
 document.querySelector('#time').textContent=fmt(e);b.textContent=x.running?'■ Durdur':'▶ '+(e?'Devam et':'Başlat');b.className=x.running?'stop':'';saveButton.disabled=e<1;st.textContent=x.running?'● Çalışıyor':e?'● Duraklatıldı':'● Hazır';st.className='status'+(x.running?' live':'');
 const days=Object.entries(x.sessions).filter(([,a])=>a.length).sort(([a],[b])=>b.localeCompare(a));
 document.querySelector('#history').innerHTML=days.length?days.map(([k,a])=>{const d=new Date(k+'T12:00:00'),total=a.reduce((s,r)=>s+r.seconds,0);return `<div class="day-group"><div class="day-head"><div class="date">${d.getDate()}<span>${d.toLocaleDateString('tr-TR',{month:'short'}).toUpperCase()}</span></div><div class="info"><b>${k===key()?'Bugün':d.toLocaleDateString('tr-TR',{weekday:'long'})}</b><small>${d.toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'})}</small></div><div class="day-total">Toplam ${short(total)}</div></div>${a.map((r,i)=>`<div class="session"><span class="session-name">${i+1}. çalışma · ${r.time}</span><span class="duration">${short(r.seconds)}</span><button class="delete-one" data-day="${k}" data-id="${r.id}">Sil</button></div>`).join('')}</div>`}).join(''):'<div class="empty">İlk çalışma kaydın burada görünecek.</div>';
 document.querySelectorAll('.delete-one').forEach(btn=>btn.onclick=()=>{if(!confirm('Bu çalışma kaydı silinsin mi?'))return;const day=btn.dataset.day;x.sessions[day]=x.sessions[day].filter(r=>r.id!==btn.dataset.id);if(!x.sessions[day].length)delete x.sessions[day];save();render()});
}
document.querySelector('#toggle').onclick=()=>{if(x.running){x.currentSeconds=elapsed();x.running=false;x.startedAt=null}else{x.running=true;x.startedAt=Date.now()}save();render()};
document.querySelector('#saveTimer').onclick=()=>{const seconds=elapsed();if(seconds<1)return;if(!confirm('Bu süre yeni bir çalışma kaydı olarak kaydedilsin mi?'))return;const k=key();x.sessions[k]=x.sessions[k]||[];x.sessions[k].push({id:String(Date.now()),seconds,time:new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})});x.running=false;x.startedAt=null;x.currentSeconds=0;save();render()};
document.querySelector('#resetTimer').onclick=()=>{if(!confirm('Kronometredeki mevcut süre sıfırlansın mı? Kaydedilmiş çalışmalar silinmez.'))return;x.running=false;x.startedAt=null;x.currentSeconds=0;save();render()};
document.querySelector('#clearAll').onclick=()=>{if(!confirm('Kaydedilmiş bütün çalışmalar silinsin mi?'))return;x.sessions={};save();render()};
document.querySelector('#syncCode').value=syncCode;document.querySelector('#connectSync').onclick=()=>{const code=document.querySelector('#syncCode').value.trim();if(!/^[A-Za-z0-9_-]{20}$/.test(code)){alert('Kod tam 20 karakter olmalı; yalnızca harf ve rakam kullan.');return}syncCode=code;localStorage.setItem('odak-sync-code',code);setSync('Bağlanıyor…');pullCloud(true)};
render();if(syncCode)pullCloud(true);setInterval(render,1000);setInterval(()=>pullCloud(false),2500);if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');
</script></body></html>
